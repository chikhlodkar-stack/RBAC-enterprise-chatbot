name: Deploy to AWS ECS

on:
  push:
    branches: [ main ]

jobs:
  evaluate-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run Ragas Evaluations
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: pytest tests/test_evals.py
      
    - name: Configure AWS credentials
      if: success()
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Build, tag, and push image to Amazon ECR
      if: success()
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin <your-account-id>.dkr.ecr.us-east-1.amazonaws.com
        docker build -t enterprise-bot .
        docker tag enterprise-bot:latest <your-account-id>.dkr.ecr.us-east-1.amazonaws.com/enterprise-bot:latest
        docker push <your-account-id>.dkr.ecr.us-east-1.amazonaws.com/enterprise-bot:latest
        
    - name: Update ECS Service
      if: success()
      run: |
        aws ecs update-service --cluster EnterpriseCluster --service ChatbotService --force-new-deployment